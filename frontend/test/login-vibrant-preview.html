<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 思觉智贸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #7C61D4;
      --primary-light: #9F85E0;
      --primary-dark: #6347C0;
      --secondary: #EAAE87;
      --secondary-light: #F0C9B0;
      --success: #16A34A;
      --warning: #D97706;
      --danger: #DC2626;
      --surface: #FFFFFF;
      --surface-2: #FFFBF7;
      --text: #2F281D;
      --text-secondary: #6B5E52;
      --text-muted: #A89F96;
      --border: #F0EBE6;
      --shadow: 0 4px 20px rgba(124, 97, 212, 0.1);
      --shadow-lg: 0 10px 40px rgba(124, 97, 212, 0.15);
      --radius: 16px;
      --radius-lg: 24px;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--surface-2);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .login-page {
      display: flex;
      min-height: 100vh;
    }

    /* Left Side - Artistic */
    .login-left {
      flex: 1.2;
      background: linear-gradient(135deg, #FFFBF7 0%, #FFF5EE 50%, #F8F0FF 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    /* Abstract Shapes */
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
    }

    .shape-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, rgba(124, 97, 212, 0.15), rgba(159, 133, 224, 0.1));
      top: -150px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }

    .shape-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, rgba(234, 174, 135, 0.2), rgba(240, 201, 176, 0.1));
      bottom: -100px;
      left: -80px;
      animation: float 10s ease-in-out infinite reverse;
    }

    .shape-3 {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, rgba(124, 97, 212, 0.1), transparent);
      bottom: 30%;
      right: 20%;
      animation: float 6s ease-in-out infinite;
      animation-delay: -2s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, 20px) scale(1.05); }
    }

    /* Content */
    .branding-content {
      position: relative;
      z-index: 1;
      max-width: 480px;
      text-align: center;
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: 48px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: var(--shadow-lg);
      transform: rotate(-5deg);
      transition: transform 0.3s ease;
    }

    .logo-icon:hover {
      transform: rotate(5deg) scale(1.05);
    }

    .logo-icon span {
      font-size: 48px;
      font-weight: 700;
      color: white;
    }

    .brand-name {
      font-size: 42px;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.1em;
    }

    .brand-name strong {
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Abstract Illustration */
    .illustration {
      width: 100%;
      max-width: 400px;
      height: 280px;
      margin: 0 auto 40px;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
    }

    .blob-1 {
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      top: 20%;
      left: 10%;
      animation: blob 4s ease-in-out infinite;
    }

    .blob-2 {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, var(--secondary), #F5C9A8);
      top: 30%;
      right: 15%;
      animation: blob 5s ease-in-out infinite;
      animation-delay: -1s;
    }

    .blob-3 {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #A78BFA, #C4B5FD);
      bottom: 20%;
      left: 30%;
      animation: blob 6s ease-in-out infinite;
      animation-delay: -2s;
    }

    @keyframes blob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(10px, -10px) scale(1.1); }
      50% { transform: translate(-5px, 10px) scale(0.95); }
      75% { transform: translate(-10px, -5px) scale(1.05); }
    }

    /* Floating Elements */
    .float-element {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatUp 6s ease-in-out infinite;
    }

    .float-element:nth-child(1) {
      top: 15%;
      left: 15%;
      animation-delay: 0s;
    }

    .float-element:nth-child(2) {
      top: 60%;
      right: 10%;
      animation-delay: -2s;
    }

    .float-element:nth-child(3) {
      bottom: 20%;
      left: 25%;
      animation-delay: -4s;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Right Side - Form */
    .login-right {
      width: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      background: white;
    }

    .login-header {
      margin-bottom: 40px;
    }

    .login-title {
      font-size: 32px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-desc {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* Form */
    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 10px;
    }

    .form-input {
      width: 100%;
      height: 52px;
      padding: 0 20px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      transition: all 0.25s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(124, 97, 212, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: color 0.25s ease;
    }

    .input-wrapper .form-input {
      padding-left: 50px;
    }

    .input-wrapper:focus-within .input-icon {
      color: var(--primary);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .checkbox.checked {
      background: var(--primary);
      border-color: var(--primary);
    }

    .checkbox-label {
      font-size: 14px;
      color: var(--text-secondary);
      user-select: none;
    }

    .forgot-link {
      font-size: 14px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Button */
    .btn-primary {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(124, 97, 212, 0.35);
      letter-spacing: 0.05em;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 97, 212, 0.45);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Footer */
    .login-footer {
      margin-top: 40px;
      text-align: center;
    }

    .footer-hint {
      font-size: 13px;
      color: var(--text-muted);
    }

    .footer-hint code {
      background: var(--surface-2);
      padding: 3px 10px;
      border-radius: 6px;
      font-family: monospace;
      color: var(--primary);
      font-weight: 500;
    }

    /* Demo Badge */
    .demo-badge {
      position: absolute;
      top: 24px;
      left: 24px;
      background: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
      box-shadow: var(--shadow);
      z-index: 2;
    }

    @media (max-width: 1024px) {
      .login-left { display: none; }
      .login-right { width: 100%; padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- Left Side - Artistic -->
    <div class="login-left">
      <div class="demo-badge">Vibrant 风格</div>
      
      <!-- Abstract Shapes -->
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
      
      <div class="branding-content">
        <!-- Logo -->
        <div class="logo-wrapper">
          <div class="logo-icon">
            <span>思</span>
          </div>
          <h1 class="brand-name"><strong>思觉</strong>智贸</h1>
        </div>

        <!-- Abstract Illustration -->
        <div class="illustration">
          <div class="blob blob-1"></div>
          <div class="blob blob-2"></div>
          <div class="blob blob-3"></div>
          
          <div class="float-element">
            <svg width="24" height="24" fill="none" stroke="#7C61D4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
          </div>
          <div class="float-element">
            <svg width="24" height="24" fill="none" stroke="#EAAE87" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
          </div>
          <div class="float-element">
            <svg width="24" height="24" fill="none" stroke="#A78BFA" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Side - Form -->
    <div class="login-right">
      <div class="login-header">
        <h2 class="login-title">欢迎回来</h2>
        <p class="login-desc">开启您的智能贸易之旅</p>
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">用户名</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </div>
            <input type="text" class="form-input" placeholder="请输入用户名">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <input type="password" class="form-input" placeholder="请输入密码">
          </div>
        </div>

        <div class="form-options">
          <div class="checkbox-wrapper">
            <div class="checkbox checked">
              <svg width="12" height="12" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <span class="checkbox-label">记住我</span>
          </div>
          <a href="#" class="forgot-link">忘记密码？</a>
        </div>

        <button type="button" class="btn-primary">登 录</button>
      </form>

      <div class="login-footer">
        <p class="footer-hint">
          试试 <code>admin</code> / <code>123456</code>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.querySelector('.checkbox-wrapper').addEventListener('click', function() {
      const checkbox = this.querySelector('.checkbox');
      checkbox.classList.toggle('checked');
    });
  </script>
</body>
</html>
