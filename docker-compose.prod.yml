# ============================================
# 思觉智贸 - 生产环境
# 启动: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  mysql:
    container_name: prod-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: sijuelishi

  redis:
    container_name: prod-redis
    command: redis-server --port 6379
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: prod-backend
    container_name: prod-backend
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=sijuelishi
      - MYSQL_USER=sijue
      - MYSQL_PASSWORD=sijue123456
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - LOG_LEVEL=INFO
      - RATE_LIMIT_ENABLED=true
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost"]}
      - COS_ENABLED=${COS_ENABLED:-false}
      - COS_SECRET_ID=${COS_SECRET_ID:-}
      - COS_SECRET_KEY=${COS_SECRET_KEY:-}
      - COS_BUCKET=${COS_BUCKET:-}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - PARQUET_DATA_DIR=/app/data
    ports:
      - "7090:7090"
    volumes:
      - prod-logs:/app/logs
      - prod-models:/app/model_cache
      - ${PARQUET_DATA_HOST_DIR:-./产品数据/压缩数据}:/app/data:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prod-frontend
    ports:
      - "7179:80"
    depends_on:
      - backend

volumes:
  prod-logs:
  prod-models:
