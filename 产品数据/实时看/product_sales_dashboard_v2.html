<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>产品销量追踪 | 领星数据</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #FFFBF7;
  --surface: #FFFFFF;
  --card: #FFFFFF;
  --border: #F0EBE6;
  --hover: #F8F4FF;
  --text: #2F281D;
  --text-dim: #6B5E52;
  --accent: #7C61D4;
  --accent-light: #9F85E0;
  --green: #16A34A;
  --red: #DC2626;
  --yellow: #D97706;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --orange: #f97316;
  --pink: #ec4899;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

/* Toast 动画 */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes fadeOutUp {
  from { opacity: 1; transform: translateX(-50%) translateY(0); }
  to { opacity: 0; transform: translateX(-50%) translateY(-20px); }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== 顶部栏 ===== */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.topbar h1 {
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.topbar .sep {
  width: 1px;
  height: 24px;
  background: var(--border);
}

/* ===== 筛选栏 ===== */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-group label {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}

.filter-group input[type="date"] {
  padding: 6px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}

.filter-group input[type="date"]:focus {
  border-color: var(--accent);
}

.filter-group input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.7);
}

/* ===== 时间范围滑块 ===== */
.time-range-group {
  flex-direction: column;
  align-items: flex-start !important;
  gap: 8px !important;
}

.time-slider-container {
  width: 100%;
  min-width: 300px;
  padding: 8px 0;
}

.time-slider-track {
  position: relative;
  height: 6px;
  background: var(--card);
  border-radius: 3px;
  cursor: pointer;
  margin: 0 10px;
}

.time-slider-range {
  position: absolute;
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  border-radius: 3px;
  pointer-events: none;
}

.time-slider-handle {
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--accent);
  border: 2px solid var(--text);
  border-radius: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  transition: transform 0.1s, box-shadow 0.1s;
  z-index: 10;
}

.time-slider-handle:hover {
  transform: translate(-50%, -50%) scale(1.2);
  box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
}

.time-slider-handle:active {
  cursor: grabbing;
  transform: translate(-50%, -50%) scale(1.3);
  box-shadow: 0 0 15px rgba(59, 130, 246, 0.7);
}

.time-slider-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  padding: 0 10px;
  font-size: 11px;
  color: var(--text-dim);
}

.shop-select {
  padding: 6px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  max-width: 200px;
}

.shop-select:focus { border-color: var(--accent); }

.search-input {
  flex: 1;
  min-width: 200px;
  padding: 7px 12px 7px 34px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
}

.search-input:focus { border-color: var(--accent); }

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
}

.selected-info {
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
}

.selected-info strong {
  color: var(--accent);
}

.btn-clear {
  padding: 5px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
}

.btn-clear:hover {
  border-color: var(--red);
  color: var(--red);
}

/* ===== 主体布局 ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== 左侧产品列表 ===== */
.sidebar {
  width: 380px;
  min-width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: var(--text-dim);
}

.sidebar-header .count {
  background: var(--card);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
}

.product-list {
  flex: 1;
  overflow-y: auto;
}

.product-item {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(36, 51, 82, 0.5);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.product-item:hover { background: var(--hover); }
.product-item.selected { background: rgba(59, 130, 246, 0.1); border-left: 3px solid var(--accent); }

.product-item .checkbox {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: all 0.15s;
}

.product-item.selected .checkbox {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.product-item .info {
  flex: 1;
  min-width: 0;
}

.product-item .info .title {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}

.product-item .info .meta {
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.product-item .info .meta span {
  white-space: nowrap;
}

.product-item .info .stats {
  font-size: 12px;
  margin-top: 3px;
}

.product-item .info .stats .sales { color: var(--accent); font-weight: 600; }
.product-item .info .stats .revenue { color: var(--purple); }

.highlight { background: rgba(250, 204, 21, 0.3); border-radius: 2px; padding: 0 1px; }

/* ===== 右侧图表区 ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.content-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.content-header h2 {
  font-size: 16px;
  font-weight: 600;
}

.chart-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 4px;
  transition: background 0.15s;
}

.legend-item:hover { background: var(--hover); }
.legend-item.dimmed { opacity: 0.35; }

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.chart-area {
  flex: 1;
  padding: 20px 24px;
  position: relative;
  min-height: 0;
}

.chart-container {
  position: relative;
  width: 100%;
  height: 100%;
}

/* 空状态 */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  gap: 12px;
}

.empty-state .icon { font-size: 48px; opacity: 0.3; }
.empty-state .text { font-size: 15px; }
.empty-state .hint { font-size: 12px; opacity: 0.6; }

/* 统计卡片 */
.summary-cards {
  display: flex;
  gap: 12px;
  padding: 0 24px 16px;
  flex-shrink: 0;
}

.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  flex: 1;
  min-width: 120px;
}

.summary-card .label {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.summary-card .value {
  font-size: 18px;
  font-weight: 700;
}

.summary-card .change {
  font-size: 11px;
  margin-top: 2px;
}

/* 滚动条 */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* 店铺下拉多选 */
.dropdown {
  position: relative;
}

.dropdown-menu {
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 0;
  min-width: 220px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 1000;
  display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.dropdown-menu.show { display: block; }

.dropdown-item {
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
}

.dropdown-item:hover { background: var(--hover); }

.dropdown-item .check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
}

.dropdown-item.checked .check {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.dropdown-actions {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.dropdown-actions button {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: none;
}

.dropdown-actions .btn-all {
  background: var(--accent);
  color: white;
}

.dropdown-actions .btn-none {
  background: var(--border);
  color: var(--text-dim);
}

/* 加载状态 */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-dim);
}

.loading::after {
  content: '';
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 错误提示 */
.error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--red);
  gap: 12px;
  padding: 20px;
  text-align: center;
}

.error-state .icon { font-size: 48px; }
.error-state .text { font-size: 15px; }
.error-state .hint { font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
  <h1>📈 产品销量追踪</h1>
  <div class="sep"></div>
  <span style="font-size:12px;color:var(--text-dim);">领星 ERP · 产品表现</span>
  <span style="font-size:12px;color:var(--text-dim);" id="dateRangeDisplay">📅 加载中...</span>
  <div style="flex:1;"></div>
  <a href="product_decline_analysis.html" style="font-size:13px;color:var(--red);text-decoration:none;padding:6px 12px;background:rgba(239,68,68,0.1);border-radius:6px;margin-right:8px;">📉 销量下滑分析</a>
  <a href="product_comparison_dashboard.html" style="font-size:13px;color:var(--accent);text-decoration:none;padding:6px 12px;background:rgba(59,130,246,0.1);border-radius:6px;">📊 双周期对比</a>
</div>

<!-- 筛选栏 -->
<div class="filter-bar">
  <div class="filter-group time-range-group">
    <label>📅 时间</label>
    <input type="date" id="dateStart" value="2026-01-01">
    <span style="color:var(--text-dim);font-size:13px;">~</span>
    <input type="date" id="dateEnd" value="2026-03-01">
    <!-- 时间范围滑块 -->
    <div class="time-slider-container">
      <div class="time-slider-track" id="timeSliderTrack">
        <div class="time-slider-range" id="timeSliderRange"></div>
        <div class="time-slider-handle time-slider-handle-start" id="timeSliderHandleStart"></div>
        <div class="time-slider-handle time-slider-handle-end" id="timeSliderHandleEnd"></div>
      </div>
      <div class="time-slider-labels" id="timeSliderLabels"></div>
    </div>
  </div>

  <div class="sep" style="width:1px;height:24px;background:var(--border);"></div>

  <div class="filter-group dropdown">
    <label>🏪 店铺</label>
    <button class="btn-clear" id="shopBtn" onclick="toggleShopDropdown()">
      全部
    </button>
    <div class="dropdown-menu" id="shopDropdown">
      <div id="shopList"></div>
      <div class="dropdown-actions">
        <button class="btn-none" onclick="setAllShops(false)">清除</button>
        <button class="btn-all" onclick="setAllShops(true)">全选</button>
      </div>
    </div>
  </div>

  <div class="sep" style="width:1px;height:24px;background:var(--border);"></div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索 ASIN / 标题 / SKU / 店铺... (支持批量，用逗号/空格/换行分隔)">
  </div>

  <div class="selected-info">
    已选 <strong id="selectedCount">0</strong> 个产品
  </div>

  <button class="btn-clear" onclick="clearSelection()">清除选择</button>
</div>

<!-- 主体 -->
<div class="main">
  <!-- 左侧产品列表 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>产品列表</span>
      <span class="count" id="productCount">0 个产品</span>
    </div>
    <div class="product-list" id="productList">
      <div class="loading">正在加载数据...</div>
    </div>
  </div>

  <!-- 右侧图表 -->
  <div class="content">
    <div class="content-header">
      <h2 id="chartTitle">📊 请选择产品查看周销量趋势</h2>
      <div class="chart-legend" id="chartLegend"></div>
    </div>
    <div class="summary-cards" id="summaryCards" style="display:none;">
      <div class="summary-card">
        <div class="label">选定周期总销量</div>
        <div class="value" id="sumSales" style="color:var(--accent);">0</div>
        <div class="change" id="sumSalesChange"></div>
      </div>
      <div class="summary-card">
        <div class="label">选定周期总销售额</div>
        <div class="value" id="sumRevenue" style="color:var(--purple);">£0</div>
        <div class="change" id="sumRevenueChange"></div>
      </div>
      <div class="summary-card">
        <div class="label">周均销量</div>
        <div class="value" id="avgSales" style="color:var(--cyan);">0</div>
      </div>
      <div class="summary-card">
        <div class="label">最高周销量</div>
        <div class="value" id="maxSales" style="color:var(--green);">0</div>
      </div>
    </div>
    <div class="chart-area">
      <div class="chart-container" id="chartContainer">
        <div class="empty-state" id="emptyState">
          <div class="icon">📊</div>
          <div class="text">从左侧选择产品查看销量趋势</div>
          <div class="hint">支持多选产品进行对比 · 可按时间范围和店铺筛选</div>
        </div>
        <canvas id="mainChart" style="display:none;"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== 配置 ====================
// API通过同源代理访问（Vite开发服务器/Nginx自动转发到后端）
const API_BASE_URL = '';

// ==================== 状态 ====================
let selectedProducts = new Set();
let selectedShops = new Set();
let allShops = [];
let dateStart = '2026-01-01';
let dateEnd = '2026-03-01';
let chart = null;
let hiddenDatasets = new Set();
let currentProducts = [];  // 当前显示的产品列表
let searchDebounceTimer = null;

const COLORS = [
  '#7C61D4','#22c55e','#a855f7','#f59e0b','#ef4444','#06b6d4',
  '#f97316','#ec4899','#14b8a6','#9F85E0'
];

// ==================== 初始化 ====================
async function init() {
  // 加载店铺列表和日期范围
  await Promise.all([
    loadShops(),
    loadDateRange()
  ]);
  
  // 绑定事件
  bindEvents();
  
  // 初始搜索（显示前50个产品）
  await searchProducts();
}

// ==================== API 调用 ====================
async function apiGet(endpoint) {
  const response = await fetch(`${API_BASE_URL}${endpoint}`);
  if (!response.ok) {
    const error = await response.text();
    throw new Error(`API错误: ${response.status} - ${error}`);
  }
  return response.json();
}

async function loadShops() {
  try {
    const data = await apiGet('/api/products/shops');
    allShops = data.map(s => s.name);
    selectedShops = new Set(allShops);
    renderShopList();
    updateShopBtn();
  } catch (e) {
    console.error('加载店铺列表失败:', e);
    showError('加载店铺列表失败: ' + e.message);
  }
}

async function loadDateRange() {
  try {
    const data = await apiGet('/api/products/date-range');
    if (data.min_date && data.max_date) {
      dateStart = data.min_date;
      dateEnd = data.max_date;
      document.getElementById('dateStart').value = dateStart;
      document.getElementById('dateEnd').value = dateEnd;
      document.getElementById('dateRangeDisplay').textContent = `📅 ${dateStart} ~ ${dateEnd}`;
      
      // 初始化时间滑块
      initTimeSlider(data.min_date, data.max_date);
    }
  } catch (e) {
    console.error('加载日期范围失败:', e);
  }
}

/**
 * 解析批量搜索输入
 * 支持逗号、空格、换行分隔的多个 ASIN
 * @param {string} input - 用户输入
 * @returns {string[]} - ASIN 列表
 */
function parseBatchAsins(input) {
  if (!input || !input.trim()) return [];
  
  // 按逗号、空格、换行、制表符分隔
  const separators = /[,，\s\n\t]+/;
  const parts = input.split(separators);
  
  // 过滤有效的 ASIN（10位字母数字组合）
  const asinPattern = /^[A-Z0-9]{10}$/i;
  const asins = parts
    .map(p => p.trim().toUpperCase())
    .filter(p => p && asinPattern.test(p));
  
  // 去重
  return [...new Set(asins)];
}

async function searchProducts() {
  const query = document.getElementById('searchInput').value.trim();
  const container = document.getElementById('productList');
  
  // 显示加载状态
  container.innerHTML = '<div class="loading">正在搜索...</div>';
  
  try {
    // 尝试解析批量 ASIN
    const batchAsins = parseBatchAsins(query);
    
    if (batchAsins.length > 1) {
      // 批量 ASIN 搜索 - 直接查询这些 ASIN
      console.log(`批量搜索 ${batchAsins.length} 个 ASIN:`, batchAsins);
      await searchBatchAsins(batchAsins);
    } else {
      // 普通关键词搜索
      const params = new URLSearchParams();
      if (query) params.append('q', query);
      if (selectedShops.size > 0 && selectedShops.size < allShops.length) {
        params.append('shops', Array.from(selectedShops).join(','));
      }
      params.append('limit', '50');
      
      const data = await apiGet(`/api/products/search?${params.toString()}`);
      currentProducts = data.products || [];
      renderProductList();
    }
  } catch (e) {
    console.error('搜索失败:', e);
    container.innerHTML = `
      <div class="error-state">
        <div class="icon">❌</div>
        <div class="text">搜索失败</div>
        <div class="hint">${escapeHtml(e.message)}</div>
      </div>
    `;
  }
}

/**
 * 批量 ASIN 搜索
 * @param {string[]} asins - ASIN 列表
 */
async function searchBatchAsins(asins) {
  const container = document.getElementById('productList');
  
  try {
    // 分批查询（每次最多 100 个）
    const batchSize = 100;
    const allProducts = [];
    
    for (let i = 0; i < asins.length; i += batchSize) {
      const batch = asins.slice(i, i + batchSize);
      const params = new URLSearchParams();
      params.append('asins', batch.join(','));
      if (selectedShops.size > 0 && selectedShops.size < allShops.length) {
        params.append('shops', Array.from(selectedShops).join(','));
      }
      params.append('limit', '50');
      
      const data = await apiGet(`/api/products/search?${params.toString()}`);
      if (data.products) {
        allProducts.push(...data.products);
      }
    }
    
    // 去重（按 ASIN）
    const seen = new Set();
    currentProducts = allProducts.filter(p => {
      if (seen.has(p.asin)) return false;
      seen.add(p.asin);
      return true;
    });
    
    // 按原始 ASIN 顺序排序
    const asinOrder = new Map(asins.map((a, i) => [a, i]));
    currentProducts.sort((a, b) => {
      const orderA = asinOrder.get(a.asin) ?? 999;
      const orderB = asinOrder.get(b.asin) ?? 999;
      return orderA - orderB;
    });
    
    renderProductList();
    
    // 显示提示
    const foundCount = currentProducts.length;
    const notFound = asins.filter(a => !currentProducts.some(p => p.asin === a));
    
    if (notFound.length > 0) {
      showToast(`找到 ${foundCount}/${asins.length} 个产品，未找到: ${notFound.join(', ')}`);
    } else {
      showToast(`成功找到全部 ${foundCount} 个产品`);
    }
    
    // 自动选中所有找到的产品
    if (currentProducts.length > 0) {
      selectedProducts = new Set(currentProducts.map(p => p.asin));
      updateChart();
    }
    
  } catch (e) {
    console.error('批量搜索失败:', e);
    container.innerHTML = `
      <div class="error-state">
        <div class="icon">❌</div>
        <div class="text">批量搜索失败</div>
        <div class="hint">${escapeHtml(e.message)}</div>
      </div>
    `;
  }
}

async function loadWeeklyData(asins) {
  if (!asins || asins.length === 0) return null;
  
  try {
    // 分批查询（每次最多 100 个）
    const batchSize = 100;
    const allWeeks = [];
    const allWeekLabels = [];
    const allData = {};
    const allRevenueData = {};
    
    for (let i = 0; i < asins.length; i += batchSize) {
      const batch = asins.slice(i, i + batchSize);
      const params = new URLSearchParams();
      params.append('asins', batch.join(','));
      params.append('start_date', dateStart);
      params.append('end_date', dateEnd);
      if (selectedShops.size > 0 && selectedShops.size < allShops.length) {
        params.append('shops', Array.from(selectedShops).join(','));
      }
      
      const batchData = await apiGet(`/api/products/weekly?${params.toString()}`);
      
      if (batchData) {
        // 合并周列表
        if (batchData.weeks) {
          batchData.weeks.forEach((week, idx) => {
            if (!allWeeks.includes(week)) {
              allWeeks.push(week);
              if (batchData.week_labels && batchData.week_labels[idx]) {
                allWeekLabels.push(batchData.week_labels[idx]);
              }
            }
          });
        }
        
        // 合并数据
        if (batchData.data) {
          Object.assign(allData, batchData.data);
        }
        if (batchData.revenue_data) {
          Object.assign(allRevenueData, batchData.revenue_data);
        }
      }
    }
    
    // 按周排序
    const sortedIndices = allWeeks.map((_, i) => i).sort((a, b) => allWeeks[a].localeCompare(allWeeks[b]));
    const sortedWeeks = sortedIndices.map(i => allWeeks[i]);
    const sortedWeekLabels = sortedIndices.map(i => allWeekLabels[i] || allWeeks[i]);
    
    // 重新排序数据
    const sortedData = {};
    const sortedRevenueData = {};
    
    for (const asin in allData) {
      sortedData[asin] = sortedIndices.map(i => allData[asin][i] || 0);
      sortedRevenueData[asin] = sortedIndices.map(i => allRevenueData[asin]?.[i] || 0);
    }
    
    return {
      weeks: sortedWeeks,
      week_labels: sortedWeekLabels,
      data: sortedData,
      revenue_data: sortedRevenueData
    };
  } catch (e) {
    console.error('加载周销量数据失败:', e);
    return null;
  }
}

// ==================== 产品列表 ====================
function renderProductList() {
  const container = document.getElementById('productList');
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  
  document.getElementById('productCount').textContent = `${currentProducts.length} 个产品`;
  
  if (currentProducts.length === 0) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim);">没有匹配的产品</div>';
    return;
  }
  
  container.innerHTML = currentProducts.map(p => {
    const isSelected = selectedProducts.has(p.asin);
    const titleHtml = query ? highlightText(p.title, query) : escapeHtml(p.title);
    const asinHtml = query ? highlightText(p.asin, query) : escapeHtml(p.asin);
    return `
      <div class="product-item ${isSelected ? 'selected' : ''}"
           onclick="toggleProduct('${p.asin}')" data-asin="${p.asin}">
        <div class="checkbox">${isSelected ? '✓' : ''}</div>
        <div class="info">
          <div class="title">${titleHtml}</div>
          <div class="meta">
            <span>${asinHtml}</span>
            ${p.msku ? `<span>SKU: ${escapeHtml(p.msku)}</span>` : ''}
            <span>${escapeHtml(p.shop)}</span>
          </div>
          <div class="stats">
            <span class="sales">${p.total_sales.toLocaleString()} 销量</span>
            <span class="revenue">£${p.total_revenue.toLocaleString()}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return escaped.replace(re, '<span class="highlight">$1</span>');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

async function toggleProduct(asin) {
  if (selectedProducts.has(asin)) {
    selectedProducts.delete(asin);
  } else {
    if (selectedProducts.size >= 10) {
      alert('最多同时对比 10 个产品');
      return;
    }
    selectedProducts.add(asin);
  }
  document.getElementById('selectedCount').textContent = selectedProducts.size;
  renderProductList();
  await updateChart();
}

  hiddenDatasets.clear();

}

/**
 * 显示 Toast 提示
 * @param {string} message - 提示消息
 * @param {number} duration - 显示时长（毫秒）
 */
function showToast(message, duration = 3000) {
  // 移除已有的 toast
  const existingToast = document.querySelector('.toast-message');
  if (existingToast) {
    existingToast.remove();
  }
  
  // 创建新的 toast
  const toast = document.createElement('div');
  toast.className = 'toast-message';
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;

// ==================== 图表 ====================
async function updateChart() {
  const canvas = document.getElementById('mainChart');
  const empty = document.getElementById('emptyState');
  const legend = document.getElementById('chartLegend');
  const summary = document.getElementById('summaryCards');
  const title = document.getElementById('chartTitle');

  if (selectedProducts.size === 0) {
    canvas.style.display = 'none';
    empty.style.display = 'flex';
    legend.innerHTML = '';
    summary.style.display = 'none';
    title.textContent = '📊 请选择产品查看周销量趋势';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  // 显示加载状态
  title.textContent = '📊 正在加载数据...';
  
  // 加载周销量数据
  const asinList = Array.from(selectedProducts);
  const weeklyData = await loadWeeklyData(asinList);
  
  if (!weeklyData || !weeklyData.weeks || weeklyData.weeks.length === 0) {
    title.textContent = '📊 所选时间范围内无数据';
    return;
  }

  canvas.style.display = 'block';
  empty.style.display = 'none';
  summary.style.display = 'flex';
  title.textContent = `📊 ${asinList.length} 个产品周销量对比`;

  const weeks = weeklyData.weeks;
  const weekLabels = weeklyData.week_labels;

  // 构建数据集
  const datasets = asinList.map((asin, i) => {
    const product = currentProducts.find(p => p.asin === asin);
    const salesData = weeklyData.data[asin] || [];
    const revenueData = weeklyData.revenue_data[asin] || [];
    const color = COLORS[i % COLORS.length];
    const isHidden = hiddenDatasets.has(asin);

    return {
      label: product ? (product.title.substring(0, 25) + (product.title.length > 25 ? '...' : '')) : asin,
      data: salesData,
      revenue: revenueData,
      borderColor: color,
      backgroundColor: color + '30',
      fill: true,
      tension: 0.3,
      pointRadius: 5,
      pointHoverRadius: 7,
      pointBackgroundColor: color,
      pointBorderColor: color,
      borderWidth: 2.5,
      hidden: isHidden,
      asin: asin,
    };
  });

  // 销毁旧图表
  if (chart) chart.destroy();

  chart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: weekLabels,
      datasets: datasets,
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15, 23, 42, 0.95)',
          borderColor: 'rgba(59, 130, 246, 0.3)',
          borderWidth: 1,
          padding: 12,
          titleFont: { size: 13, weight: '600' },
          bodyFont: { size: 12 },
          callbacks: {
            afterBody: function(items) {
              const lines = [];
              const weekIdx = items[0]?.dataIndex;
              if (weekIdx === undefined) return lines;

              // 计算环比
              if (weekIdx > 0) {
                lines.push('');
                lines.push('── 环比变化 ──');
                items.forEach(item => {
                  const curr = item.raw;
                  const prev = item.dataset.data[weekIdx - 1];
                  if (prev !== undefined && prev > 0) {
                    const change = ((curr - prev) / prev * 100).toFixed(1);
                    const arrow = change > 0 ? '↑' : change < 0 ? '↓' : '→';
                    const color = change > 0 ? '🟢' : change < 0 ? '🔴' : '⚪';
                    lines.push(`${color} ${item.dataset.label}: ${arrow} ${change > 0 ? '+' : ''}${change}%`);
                  }
                });
              }
              return lines;
            },
            label: function(context) {
              const ds = context.dataset;
              const revenue = ds.revenue?.[context.dataIndex] || 0;
              return `  ${ds.label}: ${context.raw} 销量 | £${revenue.toFixed(2)}`;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(36, 51, 82, 0.5)' },
          ticks: { font: { size: 11 } }
        },
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 } }
        }
      }
    }
  });

  // 渲染图例
  legend.innerHTML = asinList.map((asin, i) => {
    const product = currentProducts.find(p => p.asin === asin);
    const name = product ? product.title.substring(0, 20) : asin;
    const color = COLORS[i % COLORS.length];
    const dimmed = hiddenDatasets.has(asin) ? 'dimmed' : '';
    return `<div class="legend-item ${dimmed}" onclick="toggleDataset('${asin}', ${i})">
      <div class="legend-dot" style="background:${color}"></div>
      <span>${escapeHtml(name)}</span>
    </div>`;
  }).join('');

  // 更新汇总卡片
  updateSummary(weeklyData, asinList);
}

function toggleDataset(asin, index) {
  if (hiddenDatasets.has(asin)) {
    hiddenDatasets.delete(asin);
  } else {
    hiddenDatasets.add(asin);
  }
  updateChart();
}

function updateSummary(weeklyData, asinList) {
  let totalSales = 0, totalRevenue = 0;
  let weeklyTotals = new Array(weeklyData.weeks.length).fill(0);

  asinList.forEach(asin => {
    const salesArr = weeklyData.data[asin] || [];
    const revenueArr = weeklyData.revenue_data[asin] || [];
    salesArr.forEach((sales, i) => {
      totalSales += sales;
      weeklyTotals[i] += sales;
    });
    revenueArr.forEach(revenue => {
      totalRevenue += revenue;
    });
  });

  document.getElementById('sumSales').textContent = totalSales.toLocaleString();
  document.getElementById('sumRevenue').textContent = '£' + totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});

  const validWeeks = weeklyTotals.filter(v => v > 0).length;
  document.getElementById('avgSales').textContent = validWeeks > 0 ? Math.round(totalSales / validWeeks).toLocaleString() : '0';
  document.getElementById('maxSales').textContent = Math.max(...weeklyTotals, 0).toLocaleString();

  // 环比变化
  if (weeklyTotals.length >= 2) {
    const lastWeek = weeklyTotals[weeklyTotals.length - 1];
    const prevWeek = weeklyTotals[weeklyTotals.length - 2];
    if (prevWeek > 0) {
      const change = ((lastWeek - prevWeek) / prevWeek * 100).toFixed(1);
      const color = change > 0 ? 'var(--green)' : change < 0 ? 'var(--red)' : 'var(--text-dim)';
      const arrow = change > 0 ? '↑' : change < 0 ? '↓' : '→';
      document.getElementById('sumSalesChange').innerHTML =
        `<span style="color:${color}">最近周环比 ${arrow} ${change > 0 ? '+' : ''}${change}%</span>`;
    } else {
      document.getElementById('sumSalesChange').textContent = '';
    }
  }
}

// ==================== 时间滑块功能 ====================
let sliderMinDate = null;
let sliderMaxDate = null;
let isDragging = false;
let currentHandle = null;

/**
 * 初始化时间滑块
 * @param {string} minDate - 最小日期
 * @param {string} maxDate - 最大日期
 */
function initTimeSlider(minDate, maxDate) {
  sliderMinDate = new Date(minDate);
  sliderMaxDate = new Date(maxDate);
  
  const track = document.getElementById('timeSliderTrack');
  const handleStart = document.getElementById('timeSliderHandleStart');
  const handleEnd = document.getElementById('timeSliderHandleEnd');
  const range = document.getElementById('timeSliderRange');
  
  // 更新滑块位置
  updateSliderPosition();
  
  // 绑定拖拽事件
  handleStart.addEventListener('mousedown', (e) => startDrag(e, 'start'));
  handleEnd.addEventListener('mousedown', (e) => startDrag(e, 'end'));
  
  // 点击轨道直接跳转
  track.addEventListener('click', (e) => {
    if (isDragging) return;
    
    const rect = track.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    const clickedDate = dateFromPercent(percent);
    
    // 判断点击位置更接近哪个手柄
    const startDate = new Date(dateStart);
    const endDate = new Date(dateEnd);
    const distToStart = Math.abs(clickedDate - startDate);
    const distToEnd = Math.abs(clickedDate - endDate);
    
    if (distToStart < distToEnd) {
      dateStart = formatDate(clickedDate);
      document.getElementById('dateStart').value = dateStart;
    } else {
      dateEnd = formatDate(clickedDate);
      document.getElementById('dateEnd').value = dateEnd;
    }
    
    updateSliderPosition();
    updateChart();
  });
  
  // 全局鼠标事件
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
  
  // 触摸事件支持
  handleStart.addEventListener('touchstart', (e) => startDrag(e.touches[0], 'start'));
  handleEnd.addEventListener('touchstart', (e) => startDrag(e.touches[0], 'end'));
  document.addEventListener('touchmove', (e) => {
    if (isDragging) onDrag(e.touches[0]);
  });
  document.addEventListener('touchend', stopDrag);
  
  // 更新标签
  updateSliderLabels();
}

/**
 * 更新滑块标签
 */
function updateSliderLabels() {
  const labels = document.getElementById('timeSliderLabels');
  const totalDays = (sliderMaxDate - sliderMinDate) / (1000 * 60 * 60 * 24);
  const labelCount = 6; // 显示6个标签
  
  let html = '';
  for (let i = 0; i < labelCount; i++) {
    const percent = i / (labelCount - 1);
    const date = new Date(sliderMinDate.getTime() + totalDays * percent * 24 * 60 * 60 * 1000);
    html += `<span>${formatDate(date).slice(5)}</span>`;
  }
  labels.innerHTML = html;
}

/**
 * 开始拖拽
 */
function startDrag(e, handle) {
  isDragging = true;
  currentHandle = handle;
  e.preventDefault();
}

/**
 * 拖拽中
 */
function onDrag(e) {
  if (!isDragging) return;
  
  const track = document.getElementById('timeSliderTrack');
  const rect = track.getBoundingClientRect();
  let percent = (e.clientX - rect.left) / rect.width;
  percent = Math.max(0, Math.min(1, percent));
  
  const date = dateFromPercent(percent);
  
  if (currentHandle === 'start') {
    // 确保开始日期不超过结束日期
    const endDate = new Date(dateEnd);
    if (date >= endDate) {
      dateStart = formatDate(new Date(endDate.getTime() - 24 * 60 * 60 * 1000));
    } else {
      dateStart = formatDate(date);
    }
    document.getElementById('dateStart').value = dateStart;
  } else {
    // 确保结束日期不早于开始日期
    const startDate = new Date(dateStart);
    if (date <= startDate) {
      dateEnd = formatDate(new Date(startDate.getTime() + 24 * 60 * 60 * 1000));
    } else {
      dateEnd = formatDate(date);
    }
    document.getElementById('dateEnd').value = dateEnd;
  }
  
  updateSliderPosition();
}

/**
 * 停止拖拽
 */
function stopDrag() {
  if (isDragging) {
    isDragging = false;
    currentHandle = null;
    updateChart();
  }
}

/**
 * 更新滑块位置
 */
function updateSliderPosition() {
  const handleStart = document.getElementById('timeSliderHandleStart');
  const handleEnd = document.getElementById('timeSliderHandleEnd');
  const range = document.getElementById('timeSliderRange');
  
  const startPercent = dateToPercent(new Date(dateStart));
  const endPercent = dateToPercent(new Date(dateEnd));
  
  handleStart.style.left = `${startPercent * 100}%`;
  handleEnd.style.left = `${endPercent * 100}%`;
  
  range.style.left = `${startPercent * 100}%`;
  range.style.width = `${(endPercent - startPercent) * 100}%`;
}

/**
 * 日期转换为百分比
 */
function dateToPercent(date) {
  const total = sliderMaxDate - sliderMinDate;
  const current = date - sliderMinDate;
  return Math.max(0, Math.min(1, current / total));
}

/**
 * 百分比转换为日期
 */
function dateFromPercent(percent) {
  const total = sliderMaxDate - sliderMinDate;
  const current = total * percent;
  return new Date(sliderMinDate.getTime() + current);
}

/**
 * 格式化日期
 */
function formatDate(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function bindEvents() {
  // 搜索框防抖
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      searchProducts();
    }, 300);
  });

  // 日期范围变化
  document.getElementById('dateStart').addEventListener('change', (e) => {
    dateStart = e.target.value;
    updateSliderPosition();
    updateChart();
  });

  document.getElementById('dateEnd').addEventListener('change', (e) => {
    dateEnd = e.target.value;
    updateSliderPosition();
    updateChart();
  });
}

// ==================== 启动 ====================
init();
</script>

</body>
</html>
