# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod

  # 生产环境数据源
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:sijuelishi}?useUnicode=true&characterEncoding=UTF-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 1800000

  # 生产环境 Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          min-idle: 10
          max-idle: 20
          max-active: 50

  # 生产环境缓存
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=30m

  # 生产环境关闭 JMX
  jmx:
    enabled: false

# 生产环境 RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_NAMESRVADDR:rocketmq:9876}

# 生产环境日志
logging:
  level:
    root: warn
    com.sjzm: info
    com.baomidou.mybatisplus: warn
    org.springframework.security: warn

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# 生产环境关闭 Swagger
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 生产环境 Actuator 限制
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

# 生产环境 CORS 配置 - 禁用 localhost 任意端口模式
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-production-domain.com}
    allow-localhost-all-ports: false
