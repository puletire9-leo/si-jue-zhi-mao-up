# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev

  # 开发环境数据源
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:sijuelishi}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  # 开发环境 Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # 开发环境关闭缓存
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=5m

# 开发环境日志级别
logging:
  level:
    root: info
    com.sjzm: debug
    com.baomidou.mybatisplus: debug
    org.springframework.security: debug

# 开发环境开启 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 开发环境 Swagger 完全开放
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# Actuator 开发环境全开
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
