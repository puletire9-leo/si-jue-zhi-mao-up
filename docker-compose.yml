# ============================================
# 思觉智贸 - 基础设施模板（无端口，由环境 overlay 决定）
# 开发: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# 生产: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  mysql:
    image: mysql:8.0
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sijue
      MYSQL_PASSWORD: sijue123456
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
