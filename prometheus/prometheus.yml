global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sjzm-cluster'
    environment: 'production'

scrape_configs:
  - job_name: 'sjzm-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          app: 'sjzm-backend'
          version: 'v1'

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          app: 'mysql'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          app: 'redis'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
