# ============================================
# 思觉智贸 - 开发环境
# 启动: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================

services:
  mysql:
    container_name: dev-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: sijuelishi_dev

  redis:
    container_name: dev-redis
    command: redis-server --port 6379
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: dev-backend
    container_name: dev-backend
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=sijuelishi_dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IMAGE_READ_MODE=cloud
    ports:
      - "8090:8090"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
      - ./backend/static:/app/static
      - ./backend/logs:/app/logs
      - dev-thumbnails:/app/images/thumbnails
      - dev-models:/app/model_cache
      - ./产品数据:/app/data:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8090 --reload --reload-dir app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: dev-frontend
    working_dir: /app
    environment:
      VITE_BACKEND_PORT: "8090"
    ports:
      - "8179:8179"
    volumes:
      - ./frontend:/app
      - dev-node-modules:/app/node_modules
    command: >
      sh -c "npm install && npx vite --host 0.0.0.0 --port 8179 --strictPort"
    depends_on:
      - backend

volumes:
  dev-thumbnails:
  dev-models:
  dev-node-modules:
